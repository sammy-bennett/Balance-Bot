[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps = 
	adafruit/Adafruit MPU6050@^2.2.6
	;adafruit/Adafruit SSD1306@^2.5.16
